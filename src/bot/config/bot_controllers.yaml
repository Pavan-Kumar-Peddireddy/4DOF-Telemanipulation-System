controller_manager:
  ros__parameters:
    update_rate: 100

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    
    # These gains are required for the "Realistic" movement you want
    gains:
      joint_1: {p: 100.0, i: 0.1, d: 1.0}
      joint_2: {p: 100.0, i: 1.0, d: 1.0}
      joint_3: {p: 80.0, i: 0.1, d: 1.0}
      joint_4: {p: 50.0, i: 0.1, d: 0.5}
